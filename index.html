<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Analyzer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>GitHub Profile Analyzer</h1>
        <form id="search-form">
            <input type="text" id="username-input" placeholder="Enter GitHub username..." required>
            <button type="submit">Search</button>
        </form>

        <div id="result-container" class="hidden">
            <div id="profile-card">
                <!-- Profile data will be injected here -->
            </div>
            <div id="repos-container">
                <h3>Latest Repositories</h3>
                <ul id="repos-list">
                    <!-- Repos list will be injected here -->
                </ul>
            </div>
        </div>

        <div id="error-message" class="hidden">
            <p>User not found. Please check the username and try again.</p>
        </div>

        <div id="loading-spinner" class="hidden">
            <div class="spinner"></div>
            <p>Searching...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
